<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Store Link Extractor</title>
  <link rel="stylesheet" href="src/popup/popup.css">
</head>
<body>
  <main class="card" aria-live="polite">
    <button id="theme-toggle" type="button" aria-label="Toggle theme">🌙 Dark</button>
    <span id="status">Waiting...</span>
    <h2>Found: <span id="count">0</span></h2>
    <textarea id="result" placeholder="Results will appear here..." spellcheck="false"></textarea>
    <button id="run" type="button">Extract Links</button>
    <div id="error-msg" class="hidden" role="alert">Open Google Play or the App Store</div>
  </main>

  <script type="module" src="src/popup/main.js"></script>
</body>
</html>

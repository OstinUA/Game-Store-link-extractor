<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f3f4;
      --card-bg: #ffffff;
      --text: #202124;
      --muted: #5f6368;
      --accent: #2f4f4f;
      --accent-hover: #283d3d;
      --border: #dadce0;
      --error: #d93025;
      --count: #2f4f4f;
      --btn-text: #ffffff;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #111315;
      --card-bg: #1b1f23;
      --text: #f1f3f4;
      --muted: #c2c7cc;
      --accent: #6c8f8f;
      --accent-hover: #7fa3a3;
      --border: #3b444d;
      --error: #ff6b6b;
      --count: #9dc7c7;
      --btn-text: #0f1418;
    }

    body {
      width: 450px;
      font-family: sans-serif;
      padding: 1px;
      background: var(--bg);
      margin: 0;
    }

    .card {
      background: var(--card-bg);
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    #theme-toggle {
      position: absolute;
      top: 10px;
      right: 10px;
      width: auto;
      padding: 6px 10px;
      font-size: 11px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
    }

    #theme-toggle:hover {
      background: color-mix(in srgb, var(--text) 12%, transparent);
    }

    h2 { font-size: 14px; margin: 0 0 10px 0; color: var(--muted); }
    #status { font-weight: bold; color: var(--text); margin-bottom: 5px; display: block;}
    #count { color: var(--count); font-weight: bold; }
    textarea {
      width: 100%;
      height: 200px;
      margin: 10px 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px;
      font-size: 11px;
      box-sizing: border-box;
      resize: vertical;
      background: var(--card-bg);
      color: var(--text);
    }

    button {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: var(--btn-text);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .hidden { display: none; }
    #error-msg { color: var(--error); font-size: 12px; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="card">
    <button id="theme-toggle" type="button">🌙 Dark</button>
    <span id="status">Waiting...</span>
    <h2>Found: <span id="count">0</span></h2>
    <textarea id="result" placeholder="Results will appear here..."></textarea>
    <button id="run">Extract Links</button>
    <div id="error-msg" class="hidden">Open Google Play or the App Store</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
